services:

  naming-server:
    image: naming-server:0.0.1-SNAPSHOT
    container_name: naming-server
    ports:
      - "8761:8761"

  spring-cloud-config-server:
    image: spring-cloud-config-server:0.0.1-SNAPSHOT
    container_name: spring-cloud-config-server
    ports:
      - "8888:8888"
    volumes:
      - "D:/newer projects/git-localconfigserver-repo-prob:/config-repo"
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: file:/config-repo
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: .
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: feature/config-server
      JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
    depends_on:
      - naming-server

  limits-services:
    image: limits-services:0.0.1-SNAPSHOT
    container_name: limits-services
    ports:
      - "8080:8080"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://spring-cloud-config-server:8888
      EUREKA_CLIENT_SERVICE_URL_DEFAULT_ZONE: http://naming-server:8761/eureka
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"

      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
    depends_on:
      - spring-cloud-config-server
      - naming-server

  currency-exchange-services-8000:
    image: currency-exchange-services:0.0.1-SNAPSHOT
    container_name: currency-exchange-services-8000
    ports:
      - "8000:8000"
    environment:
      SERVER_PORT: 8000
      SPRING_CONFIG_IMPORT: optional:configserver:http://spring-cloud-config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_INSTANCE_INSTANCE_ID: currency-exchange-services-8000
      JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
    depends_on:
      - spring-cloud-config-server
      - naming-server

  currency-exchange-services-8001:
      image: currency-exchange-services:0.0.1-SNAPSHOT
      container_name: currency-exchange-services-8001
      ports:
        - "8001:8001"
      environment:
        SERVER_PORT: 8001
        SPRING_CONFIG_IMPORT: optional:configserver:http://spring-cloud-config-server:8888
        EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
        EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
        EUREKA_CLIENT_FETCH_REGISTRY: "true"
        EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
        EUREKA_INSTANCE_INSTANCE_ID: currency-exchange-services-8001
        JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
      depends_on:
        - spring-cloud-config-server
        - naming-server

  currency-conversion-services:
    image: currency-conversion-services:0.0.1-SNAPSHOT
    container_name: currency-conversion-services
    ports:
      - "8100:8100"
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://spring-cloud-config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"

      EUREKA_CLIENT_FETCH_REGISTRY: "true"

      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
    depends_on:
      - spring-cloud-config-server
      - naming-server
      - currency-exchange-services-8000
      - currency-exchange-services-8001

  api-gateway:
    image: api-gateway:0.0.1-SNAPSHOT
    container_name: api-gateway
    ports:
      - "8765:8765"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka
      JAVA_TOOL_OPTIONS: "-Deureka.client.serviceUrl.defaultZone=http://naming-server:8761/eureka"
    depends_on:
      - naming-server
      - currency-conversion-services
      - currency-exchange-services-8000
      - currency-exchange-services-8001
      - limits-services
  zipkin:
    image: openzipkin/zipkin:2.23
    container_name: zipkin
    ports:
      - "9411:9411"